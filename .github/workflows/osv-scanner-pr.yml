name: OSV-Scanner PR Scan

on:
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]

permissions:
  actions: read
  contents: read

jobs:
  scan-pr:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5"
    with:
      upload-sarif: false
